<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeafMC - Discord Regeln</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f1c3f, #070d1f);
    color: white;
    text-align: center;
}

/* Titel */
.header {
    padding: 80px 20px 40px;
}

.header h1 {
    font-size: 60px;
    color: #6c7cff;
    letter-spacing: 3px;
}

.header p {
    color: #aaa;
    letter-spacing: 5px;
}

/* Container */
.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
}

/* Regel Karten */
.card {
    background: linear-gradient(145deg, #111a3a, #0a122b);
    border-radius: 20px;
    padding: 30px;
    margin: 30px 0;
    border: 1px solid rgba(108,124,255,0.3);
    box-shadow: 0 0 20px rgba(108,124,255,0.2);
    transition: all 0.3s ease;
}

/* Hover Effekt */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 35px rgba(108,124,255,0.6);
}

.card h2 {
    margin-bottom: 15px;
    color: #6c7cff;
}

.card p {
    color: #ccc;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="header">
    <h1>LeafMC</h1>
    <p>DISCORD REGELN</p>
</div>

<div class="container">

    <div class="card">
        <h2>🤝 Respektvoller Umgang</h2>
        <p>
            Behandle alle Mitglieder freundlich und respektvoll.
            Keine Beleidigungen, Hetze, Mobbing oder Diskriminierung.
        </p>
    </div>

    <div class="card">
        <h2>🚫 Kein Spam / Nervverhalten</h2>
        <p>
            Kein Flooding, übermäßige Emojis, CAPS oder unnötiges Pingen.
            Halte die Kanäle übersichtlich und angenehm.
        </p>
    </div>

</div>

</body>
</html>
